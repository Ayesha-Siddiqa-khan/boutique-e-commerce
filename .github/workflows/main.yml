name: Boutique E-Commerce CI/CD

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend-service
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: frontend-service

          - name: api-gateway
            context: ./api-gateway
            dockerfile: ./api-gateway/Dockerfile
            image: api-gateway

          - name: auth-service
            context: ./auth-service
            dockerfile: ./auth-service/Dockerfile
            image: auth-service

          - name: product-service
            context: ./product-service
            dockerfile: ./product-service/Dockerfile
            image: product-service

          - name: cart-service
            context: ./cart-service
            dockerfile: ./cart-service/Dockerfile
            image: cart-service

          - name: order-service
            context: ./order-service
            dockerfile: ./order-service/Dockerfile
            image: order-service

          - name: user-service
            context: ./user-service
            dockerfile: ./user-service/Dockerfile
            image: user-service

          - name: payment-service
            context: ./payment-service
            dockerfile: ./payment-service/Dockerfile
            image: payment-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes (Minikube)
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Kubernetes Cluster
        run: kubectl get nodes

      - name: Apply Kubernetes Manifests
        run: kubectl apply -f k8s/

      - name: Restart Deployments (Rolling Update)
        run: |
          kubectl rollout restart deployment frontend-service -n boutique-app
          kubectl rollout restart deployment api-gateway-service -n boutique-app
          kubectl rollout restart deployment auth-service -n boutique-app
          kubectl rollout restart deployment product-service -n boutique-app
          kubectl rollout restart deployment cart-service -n boutique-app
          kubectl rollout restart deployment order-service -n boutique-app
          kubectl rollout restart deployment user-service -n boutique-app
          kubectl rollout restart deployment payment-service -n boutique-app

      - name: Verify Deployment
        run: |
          kubectl get pods -n boutique-app
          kubectl get svc -n boutique-app
