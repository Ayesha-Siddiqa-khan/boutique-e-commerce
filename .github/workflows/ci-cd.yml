name: Boutique E-Commerce CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend-service
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: frontend-service
          - name: api-gateway
            context: ./api-gateway
            dockerfile: ./api-gateway/Dockerfile
            image: api-gateway
          - name: auth-service
            context: ./auth-service
            dockerfile: ./auth-service/Dockerfile
            image: auth-service
          - name: product-service
            context: ./product-service
            dockerfile: ./product-service/Dockerfile
            image: product-service
          - name: cart-service
            context: ./cart-service
            dockerfile: ./cart-service/Dockerfile
            image: cart-service
          - name: order-service
            context: ./order-service
            dockerfile: ./order-service/Dockerfile
            image: order-service
          - name: user-service
            context: ./user-service
            dockerfile: ./user-service/Dockerfile
            image: user-service
          - name: payment-service
            context: ./payment-service
            dockerfile: ./payment-service/Dockerfile
            image: payment-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Update image tags to commit SHA
        run: |
          sed -i "s|yourdockerhubusername/frontend-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/frontend-service:${{ github.sha }}|g" k8s/deployments/frontend-deployment.yaml
          sed -i "s|yourdockerhubusername/api-gateway:latest|${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ github.sha }}|g" k8s/deployments/api-gateway-deployment.yaml
          sed -i "s|yourdockerhubusername/auth-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${{ github.sha }}|g" k8s/deployments/auth-deployment.yaml
          sed -i "s|yourdockerhubusername/product-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ github.sha }}|g" k8s/deployments/product-deployment.yaml
          sed -i "s|yourdockerhubusername/cart-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/cart-service:${{ github.sha }}|g" k8s/deployments/cart-deployment.yaml
          sed -i "s|yourdockerhubusername/order-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }}|g" k8s/deployments/order-deployment.yaml
          sed -i "s|yourdockerhubusername/user-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }}|g" k8s/deployments/user-deployment.yaml
          sed -i "s|yourdockerhubusername/payment-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/payment-service:${{ github.sha }}|g" k8s/deployments/payment-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/
          kubectl apply -f k8s/configmaps/
          kubectl apply -f k8s/secrets/
          kubectl apply -f k8s/deployments/
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/monitoring/

      - name: Rollout status
        run: |
          kubectl rollout status deployment/frontend-service -n boutique-app
          kubectl rollout status deployment/api-gateway-service -n boutique-app
          kubectl rollout status deployment/auth-service -n boutique-app
          kubectl rollout status deployment/product-service -n boutique-app
          kubectl rollout status deployment/cart-service -n boutique-app
          kubectl rollout status deployment/order-service -n boutique-app
          kubectl rollout status deployment/user-service -n boutique-app
          kubectl rollout status deployment/payment-service -n boutique-app

      - name: Verify deployment
        run: |
          kubectl get pods -n boutique-app
          kubectl get svc -n boutique-app
