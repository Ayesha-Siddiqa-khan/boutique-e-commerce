apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: boutique-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ayeshactn/payment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4006
          env:
            - name: PORT
              value: "4006"
          readinessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "80m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
